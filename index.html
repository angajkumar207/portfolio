<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Angaj Kumar | Data Science Portfolio</title>

  <style>
    body {
      background: #23243a;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      cursor: default;
    }

    /* 🔹 Cursor change while scrolling */
    .scroll-cursor {
      cursor: grabbing;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 6vw 1rem 6vw;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: bold;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
      cursor: pointer;
    }

    .nav-links a:hover {
      color: #00f6d1;
    }

    .section {
      padding: 5vw 6vw;
      max-width: 1110px;
      margin: 0 auto;
    }

    .header-flex {
      display: flex;
      align-items: center;
      gap: 2.2em;
      flex-wrap: wrap;
    }

    .profile-photo {
      background: #00f6d1;
      border-radius: 25px;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 24px #00f6d199;
      overflow: hidden;
    }

    .profile-photo img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 18px;
    }

    .intro-main h1 {
      font-size: 2.4em;
      margin-bottom: 0.5em;
    }

    .animated-text {
      font-size: 1.45em;
      font-weight: 600;
      background: #00f6d1;
      color: #23243a;
      border-radius: 6px;
      padding: 2px 10px;
      display: inline-block;
      margin-bottom: 1em;
      border-right: 0.18em solid #23243a;
      white-space: nowrap;
    }

    .intro-main p {
      margin: 1em 0 2em 0;
      opacity: 0.9;
      font-size: 1.08em;
      max-width: 460px;
    }

    .social {
      display: flex;
      gap: 1.3rem;
    }

    .social a {
      width: 48px;
      height: 48px;
      background: #191e26;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00f6d1;
      font-size: 1.55rem;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .social a:hover {
      transform: scale(1.15);
    }

    footer {
      background: rgba(0, 0, 50, 0.6);
      color: #bbdefb;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">Portfolio.</div>
    <div class="nav-links">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#portfolio">Portfolio</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <section id="home" class="section">
    <div class="header-flex">
      <div class="intro-main">
        <h1>Hello, It's Me<br>Angaj Kumar</h1>
        <div class="animated-text" id="typewriter"></div>
        <p>Data enthusiast uncovering hidden patterns and building GenAI applications.</p>
      </div>

      <div class="profile-photo">
        <img src="image.jpg" alt="Profile Photo">
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; Angaj Kumar 2025 ❤️</p>
  </footer>

  <!-- Typewriter JS -->
  <script>
    const typewriter = document.getElementById('typewriter');
    const words = ["Data Science Portfolio", "Gen AI Learner 🚀", "Python | ML | Analytics"];
    let i = 0, j = 0, del = false;

    function type() {
      typewriter.textContent = words[i].substring(0, j);
      if (!del && j++ === words[i].length) del = true;
      if (del && j-- === 0) { del = false; i = (i + 1) % words.length; }
      setTimeout(type, del ? 60 : 120);
    }
    type();
  </script>

  <!-- 🔹 Cursor change while scrolling -->
  <script>
    let scrollTimeout;
    window.addEventListener("scroll", () => {
      document.body.classList.add("scroll-cursor");
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        document.body.classList.remove("scroll-cursor");
      }, 250);
    });
  </script>

</body>
</html>
